    <div class="layout-container">

        <main class="content-area">

                <p class="portfolio-tag">PORTFOLIO!</p>
                <h1 class="hero-title" style="font-size: 3.5rem;">Get minds<br>have purpose</h1>

            <div id="project-gallery-area" style="padding-top: 40px;">

                    <div class="project-item" onclick="saveScrollAndGo('project-sop.html')">

    <script src="script.js"></script>
    
    <script>
        // 1. 向下滚动的动画
        function scrollToGallery() {
            const gallery = document.getElementById('project-gallery-area');
            const yOffset = -80; 
            const y = gallery.getBoundingClientRect().top + window.pageYOffset + yOffset;
            window.scrollTo({top: y, behavior: 'smooth'});
        }

        // 2. 跳转前保存当前位置 (新功能)
        function saveScrollAndGo(url) {
            // 将当前的滚动高度保存到 SessionStorage 中，key 为 'projectsScrollY'
            sessionStorage.setItem('projectsScrollY', window.scrollY);
            // 跳转页面
            window.location.href = url;
        }

        // 3. 页面加载时恢复位置 (新功能)
        document.addEventListener("DOMContentLoaded", function() {
            // 检查是否有保存的滚动位置
            const savedScrollY = sessionStorage.getItem('projectsScrollY');
            
            if (savedScrollY) {
                // 如果有，立即滚过去（使用 instant 瞬间到达，避免看着头晕）
                window.scrollTo({
                    top: parseInt(savedScrollY),
                    behavior: 'instant' 
                });
                
                // 重要：恢复完后清除记录，防止刷新页面时也莫名其妙往下滚
                sessionStorage.removeItem('projectsScrollY');
            }
        });
    </script>
</body>
